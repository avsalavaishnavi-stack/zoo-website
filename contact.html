<section class="cont">

<h2 class="section-title">Book Your Visit</h2>

<form id="bookingForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<label>Select Visit Date</label>
<input type="date" id="date" required>

<label>Number of Visitors</label>
<input type="number" id="visitors" min="1" max="20" placeholder="Enter number of people">

<label>Select Safari Type</label>
<select id="safari" required>
<option value="">Choose Safari</option>
<option value="Morning Safari">Morning Safari</option>
<option value="Evening Safari">Evening Safari</option>
</select>

<label>Your Message</label>
<textarea id="message" rows="4" placeholder="Any special request"></textarea>

<button type="submit">Submit Booking</button>

</form>


<h2 class="section-title">Our Location</h2>

<iframe
src="https://maps.google.com/maps?q=delhi%20zoo&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="350" style="border:0;" allowfullscreen>
</iframe>

</section>
